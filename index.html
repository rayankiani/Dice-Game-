<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dice Royale — Roll Your Fate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div style="position:relative;display:flex;align-items:center;justify-content:center;">
    <div class="loader-ring"></div>
    <div class="loader-dice">
      <div class="loader-cube">
        <div class="f1">⚀</div><div class="f2">⚅</div>
        <div class="f3">⚂</div><div class="f4">⚄</div>
        <div class="f5">⚁</div><div class="f6">⚃</div>
      </div>
    </div>
  </div>
  <div class="loader-tagline">Roll Your Fate</div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
</div>

<!-- MAIN -->
<main class="stage" id="stage">
  <h1 class="title">Dice Royale</h1>
  <div class="subtitle">— First to 50 Wins · Beware the One —</div>

  <!-- Scoreboard -->
  <div class="scoreboard" id="scoreboard">
    <div class="score-card you" id="cardYou">
      <div class="score-label">You</div>
      <div class="score-value" id="scoreYou">0</div>
      <div class="score-sub">Banked</div>
    </div>
    <div class="turn-pot">
      <div class="pot-label">Turn Points</div>
      <div class="pot-value" id="turnPot">0</div>
      <div class="pot-target">Target · 50</div>
    </div>
    <div class="score-card house" id="cardHouse">
      <div class="score-label">House</div>
      <div class="score-value" id="scoreHouse">0</div>
      <div class="score-sub">Banked</div>
    </div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="diceCanvas" width="420" height="420"></canvas>
    <canvas id="particleCanvas"></canvas>
  </div>

  <div class="turn-indicator" id="turnIndicator">Your Turn</div>

  <div class="actions">
    <button class="roll-btn" id="rollBtn">Roll<span class="spinner"></span></button>
    <button class="roll-btn bank-btn" id="bankBtn">Bank</button>
  </div>

  <div class="history" id="history"></div>
  <button class="reset-btn" id="resetBtn">Restart Game</button>
</main>

<!-- WIN MODAL -->
<div class="modal" id="modal">
  <div class="modal-card">
    <div class="modal-title" id="modalTitle">Victory</div>
    <div class="modal-sub" id="modalSub">You have outrolled the House.</div>
    <button class="roll-btn" id="modalBtn">Play Again</button>
  </div>
</div>

<!-- LIBS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
<script src="script.js"></script>
</body>
</html>
