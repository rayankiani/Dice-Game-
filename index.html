<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dice Royale — Roll Your Fate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0D0D0F;
    --gold:#C9A84C;
    --gold-soft:#e3c878;
    --crimson:#8B0000;
    --ivory:#F0EDE8;
    --panel:rgba(20,20,24,0.55);
    --border:rgba(201,168,76,0.25);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  body{
    font-family:'Inter',sans-serif;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.08), transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(139,0,0,0.06), transparent 60%),
      #0D0D0F;
    color:var(--ivory);
    min-height:100vh;
    position:relative;
    overflow:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
    z-index:0;
  }

  /* LOADER */
  #loader{
    position:fixed;inset:0;background:#0D0D0F;z-index:1000;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    transition:opacity .8s cubic-bezier(.7,0,.3,1);
  }
  .loader-dice{
    width:120px;height:120px;position:relative;
    perspective:600px;
  }
  .loader-cube{
    width:100%;height:100%;position:relative;transform-style:preserve-3d;
    animation:spinCube 2.2s cubic-bezier(.5,.1,.5,.9) infinite;
  }
  .loader-cube div{
    position:absolute;width:120px;height:120px;
    background:linear-gradient(145deg,#fafaf5,#d8d3c4);
    border:2px solid #2a2a2e;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    color:#111;font-weight:700;font-size:42px;
    box-shadow:inset 0 0 24px rgba(0,0,0,.15);
  }
  .loader-cube .f1{transform:translateZ(60px)}
  .loader-cube .f2{transform:rotateY(180deg) translateZ(60px)}
  .loader-cube .f3{transform:rotateY(90deg) translateZ(60px)}
  .loader-cube .f4{transform:rotateY(-90deg) translateZ(60px)}
  .loader-cube .f5{transform:rotateX(90deg) translateZ(60px)}
  .loader-cube .f6{transform:rotateX(-90deg) translateZ(60px)}
  @keyframes spinCube{
    0%{transform:rotateX(0) rotateY(0)}
    100%{transform:rotateX(360deg) rotateY(360deg)}
  }
  .loader-ring{
    position:absolute;width:200px;height:200px;border-radius:50%;
    border:2px solid transparent;border-top-color:var(--gold);border-right-color:var(--gold-soft);
    animation:ringSpin 1.6s linear infinite;
    box-shadow:0 0 40px rgba(201,168,76,.35), inset 0 0 30px rgba(201,168,76,.1);
  }
  @keyframes ringSpin{to{transform:rotate(360deg)}}
  .loader-tagline{
    margin-top:60px;font-family:'Cormorant Garamond',serif;
    color:var(--gold);font-size:22px;letter-spacing:.5em;
    text-transform:uppercase;font-weight:500;
    text-shadow:0 0 18px rgba(201,168,76,.5);
  }
  .progress-wrap{
    margin-top:30px;width:260px;height:2px;background:rgba(255,255,255,.08);
    overflow:hidden;border-radius:2px;
  }
  .progress-bar{
    height:100%;width:0%;
    background:linear-gradient(90deg, var(--gold), var(--gold-soft), var(--gold));
    box-shadow:0 0 10px var(--gold);
    transition:width 2.5s cubic-bezier(.6,.05,.3,1);
  }

  /* MAIN */
  .stage{
    position:relative;z-index:2;
    height:100svh;
    width:100%;
    max-width:960px;
    margin:0 auto;
    display:flex;flex-direction:column;align-items:center;
    justify-content:flex-start;
    padding:clamp(10px,1.3vw,14px) clamp(12px,2vw,22px) calc(clamp(10px,1.3vw,14px) + env(safe-area-inset-bottom, 0px));
    gap:clamp(4px,0.9vw,10px);
    overflow:hidden;
  }
  .title{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(20px,3.6vw,42px);
    font-weight:600;letter-spacing:0.3em;
    color:var(--gold);
    text-transform:uppercase;
    text-shadow:0 0 30px rgba(201,168,76,.35), 0 2px 0 #000;
    margin-bottom:4px;
  }
  .subtitle{
    font-size:clamp(9px,1vw,11px);letter-spacing:.5em;color:rgba(240,237,232,.4);
    text-transform:uppercase;margin-bottom:0;
  }

  .canvas-wrap{
    position:relative;
    width:clamp(160px,34vw,270px);
    aspect-ratio:1/1;
    display:flex;align-items:center;justify-content:center;
  }
  #diceCanvas{width:100%;height:100%}
  .canvas-wrap::before{
    content:"";position:absolute;inset:-30px;border-radius:50%;
    background:radial-gradient(circle, rgba(201,168,76,.12), transparent 60%);
    pointer-events:none;
  }
  #diceCanvas{
    display:block;border-radius:50%;
    cursor:grab;
    touch-action:none;
    user-select:none;
  }
  #diceCanvas:active{cursor:grabbing}
  #particleCanvas{
    position:absolute;inset:0;pointer-events:none;width:100%;height:100%;
  }

  .roll-btn{
    margin-top:0;
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(15px,2.4vw,20px);letter-spacing:.35em;
    padding:12px clamp(28px,5vw,52px);border-radius:999px;
    background:rgba(13,13,15,.7);
    color:var(--gold);
    border:1.5px solid var(--gold);
    text-transform:uppercase;cursor:pointer;
    transition:all .35s cubic-bezier(.7,0,.3,1);
    box-shadow:0 0 0 rgba(201,168,76,0), inset 0 0 0 rgba(201,168,76,0);
    position:relative;overflow:hidden;
  }
  .roll-btn:hover{
    background:var(--gold);color:#111;
    box-shadow:0 8px 30px rgba(201,168,76,.4), 0 0 60px rgba(201,168,76,.2);
  }
  .roll-btn:active{transform:scale(.97)}
  .roll-btn:disabled{opacity:.55;cursor:not-allowed}
  .roll-btn .spinner{
    display:none;width:16px;height:16px;border:2px solid currentColor;
    border-top-color:transparent;border-radius:50%;
    animation:ringSpin .8s linear infinite;margin-left:10px;vertical-align:middle;
  }
  .roll-btn.loading .spinner{display:inline-block}

  .stats{
    margin-top:12px;
    display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));
    gap:1px;background:var(--border);
    border:1px solid var(--border);border-radius:14px;overflow:hidden;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    background-color:var(--panel);
    max-width:640px;width:100%;
  }
  .stat{
    padding:16px 18px;background:rgba(13,13,15,.6);
    text-align:center;
  }
  .stat .label{
    font-size:10px;letter-spacing:.3em;color:rgba(240,237,232,.45);
    text-transform:uppercase;margin-bottom:6px;
  }
  .stat .value{
    font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold);
    font-weight:600;
  }
  .stat.danger .value{color:var(--crimson)}

  .history{
    margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
    max-width:520px;min-height:24px;
  }
  .chip{
    width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
    color:#aaa;
    animation:chipIn .4s cubic-bezier(.5,1.5,.5,1);
  }
  .chip.gold{
    background:linear-gradient(145deg,var(--gold),var(--gold-soft));color:#111;
    border-color:var(--gold);box-shadow:0 0 12px rgba(201,168,76,.5);
  }
  .chip.red{
    background:linear-gradient(145deg,#5a0000,var(--crimson));color:#fff;
    border-color:var(--crimson);box-shadow:0 0 10px rgba(139,0,0,.4);
  }
  @keyframes chipIn{from{transform:scale(0) rotate(-90deg);opacity:0}to{transform:scale(1);opacity:1}}

  /* GAME UI */
  .scoreboard{
    margin-bottom:0;display:grid;
    grid-template-columns:1fr auto 1fr;gap:10px;
    align-items:center;width:100%;max-width:560px;
  }
  .score-card{
    padding:14px 20px;border-radius:14px;
    background:rgba(13,13,15,.65);
    border:1px solid rgba(255,255,255,.06);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    text-align:center;transition:all .4s cubic-bezier(.7,0,.3,1);
  }
  .score-card.active{
    border-color:var(--gold);
    box-shadow:0 0 30px rgba(201,168,76,.25), inset 0 0 20px rgba(201,168,76,.08);
  }
  .score-label{
    font-size:10px;letter-spacing:.4em;text-transform:uppercase;
    color:rgba(240,237,232,.5);margin-bottom:4px;
  }
  .score-value{
    font-family:'Cormorant Garamond',serif;font-size:42px;
    font-weight:600;color:var(--gold);line-height:1;
  }
  .score-sub{
    font-size:9px;letter-spacing:.3em;text-transform:uppercase;
    color:rgba(240,237,232,.35);margin-top:6px;
  }
  .turn-pot{
    padding:10px 18px;border-radius:50%;
    width:96px;height:96px;
    background:radial-gradient(circle, rgba(201,168,76,.18), rgba(13,13,15,.7) 70%);
    border:1.5px solid var(--gold);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    box-shadow:0 0 25px rgba(201,168,76,.25);
  }
  .pot-label{font-size:8px;letter-spacing:.25em;color:var(--gold);opacity:.7;text-transform:uppercase}
  .pot-value{font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--ivory);font-weight:600;line-height:1}
  .pot-target{font-size:8px;letter-spacing:.2em;color:rgba(240,237,232,.4);text-transform:uppercase;margin-top:2px}

  .turn-indicator{
    margin-top:2px;font-family:'Cormorant Garamond',serif;
    font-size:15px;letter-spacing:.4em;text-transform:uppercase;
    color:var(--gold);text-shadow:0 0 12px rgba(201,168,76,.4);
    min-height:20px;
  }
  .turn-indicator.bust{color:var(--crimson);text-shadow:0 0 12px rgba(139,0,0,.6)}

  .actions{
    display:flex;gap:12px;margin-top:6px;flex-wrap:wrap;justify-content:center;
    width:100%;max-width:520px;
  }
  .bank-btn{
    border-color:rgba(240,237,232,.5);color:var(--ivory);
  }
  .bank-btn:hover{background:var(--ivory);color:#111;box-shadow:0 8px 30px rgba(240,237,232,.2)}

  .reset-btn{
    margin-top:4px;background:transparent;border:none;
    color:rgba(240,237,232,.4);font-size:11px;letter-spacing:.3em;
    text-transform:uppercase;cursor:pointer;transition:color .3s;
    padding:6px 0 2px;
  }
  .reset-btn:hover{color:var(--gold)}

  /* MODAL */
  .modal{
    position:fixed;inset:0;background:rgba(13,13,15,.85);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    z-index:500;display:none;align-items:center;justify-content:center;
    opacity:0;transition:opacity .5s;
  }
  .modal.show{display:flex;opacity:1}
  .modal-card{
    text-align:center;padding:clamp(24px,5vw,40px) clamp(20px,7vw,60px);border-radius:20px;
    background:rgba(20,20,24,.9);border:1.5px solid var(--gold);
    box-shadow:0 0 80px rgba(201,168,76,.3);
    transform:scale(.85);transition:transform .5s cubic-bezier(.5,1.5,.5,1);
    width:min(92vw,460px);
  }
  .modal.show .modal-card{transform:scale(1)}
  .modal-title{
    font-family:'Cormorant Garamond',serif;font-size:clamp(34px,7vw,48px);
    color:var(--gold);letter-spacing:.2em;text-transform:uppercase;
    text-shadow:0 0 30px rgba(201,168,76,.5);margin-bottom:8px;
  }
  .modal-card.lose .modal-title{color:var(--crimson);text-shadow:0 0 30px rgba(139,0,0,.6)}
  .modal-card.lose{border-color:var(--crimson);box-shadow:0 0 80px rgba(139,0,0,.3)}
  .modal-sub{
    font-size:13px;letter-spacing:.2em;color:rgba(240,237,232,.6);
    text-transform:uppercase;margin-bottom:24px;
  }

  @media (max-width:540px){
    .stage{
      justify-content:center;
      padding:4px 12px calc(4px + env(safe-area-inset-bottom, 0px));
      gap:1px;
    }
    .title{
      letter-spacing:.16em;
      font-size:clamp(18px,5vw,28px);
      margin-bottom:0;
    }
    .subtitle{
      letter-spacing:.2em;
      font-size:9px;
      margin-bottom:2px;
    }
    .scoreboard{
      grid-template-columns:1fr 1fr;
      gap:6px;
      max-width:100%;
      margin-top:0;
    }
    .turn-pot{
      grid-column:1 / -1;
      justify-self:center;
      order:-1;
      width:70px;
      height:70px;
      padding:4px;
    }
    .pot-label,.pot-target{font-size:7px}
    .pot-value{font-size:18px}
    .score-card{padding:6px 8px;border-radius:12px}
    .score-label{font-size:9px;letter-spacing:.3em}
    .score-value{font-size:22px}
    .score-sub{font-size:8px}
    .canvas-wrap{
      width:min(52vw,210px);
      margin:0;
    }
    .turn-indicator{
      margin-top:0;
      font-size:12px;
      letter-spacing:.28em;
    }
    .actions{
      width:100%;
      max-width:100%;
      margin-top:0;
      gap:8px;
    }
    .roll-btn{
      flex:1 1 0;
      min-width:0;
      padding:10px 14px;
      letter-spacing:.22em;
      font-size:13px;
    }
    .history{
      margin-top:0;
      gap:5px;
      min-height:18px;
      max-width:100%;
    }
    .chip{
      width:24px;
      height:24px;
      font-size:12px;
    }
    .reset-btn{
      width:100%;
      text-align:center;
      font-size:10px;
      letter-spacing:.28em;
      padding:2px 0 0;
      margin-top:0;
    }
  }
  /* short viewports — keep everything in view */
  @media (max-height:720px){
    .canvas-wrap{width:clamp(150px,30vw,220px)}
  }
  @media (max-height:600px){
    .stage{padding:4px 10px calc(4px + env(safe-area-inset-bottom, 0px));gap:2px}
    .title{font-size:clamp(16px,4.4vw,24px)}
    .subtitle{font-size:8px}
    .scoreboard{margin-bottom:0}
    .score-card{padding:4px 8px}
    .score-value{font-size:20px;line-height:1}
    .turn-pot{width:60px;height:60px;padding:3px}
    .pot-value{font-size:16px}
    .canvas-wrap{width:clamp(128px,24vw,170px)}
    .turn-indicator{margin-top:0;font-size:10px}
    .actions{margin-top:0;gap:6px}
    .roll-btn{padding:7px 18px;font-size:12px;letter-spacing:.18em}
    .history{margin-top:0;min-height:0}
    .chip{width:18px;height:18px;font-size:10px}
    .reset-btn{padding-top:2px;margin-top:2px}
  }
  @media (orientation:landscape) and (max-height:600px){
    .stage{
      flex-direction:row;
      flex-wrap:wrap;
      justify-content:center;
      align-items:center;
      align-content:flex-start;
    }
    .title,.subtitle,.reset-btn,.history,.turn-indicator{width:100%;text-align:center}
    .scoreboard{max-width:520px}
    .canvas-wrap{order:2}
    .scoreboard{order:1}
    .turn-indicator{order:3}
    .actions{order:4}
    .history{order:5}
    .reset-btn{order:6}
  }
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div style="position:relative;display:flex;align-items:center;justify-content:center;">
    <div class="loader-ring"></div>
    <div class="loader-dice">
      <div class="loader-cube">
        <div class="f1">⚀</div><div class="f2">⚅</div>
        <div class="f3">⚂</div><div class="f4">⚄</div>
        <div class="f5">⚁</div><div class="f6">⚃</div>
      </div>
    </div>
  </div>
  <div class="loader-tagline">Roll Your Fate</div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
</div>

<!-- MAIN -->
<main class="stage" id="stage">
  <h1 class="title">Dice Royale</h1>
  <div class="subtitle">— First to 50 Wins · Beware the One —</div>

  <!-- Scoreboard -->
  <div class="scoreboard" id="scoreboard">
    <div class="score-card you" id="cardYou">
      <div class="score-label">You</div>
      <div class="score-value" id="scoreYou">0</div>
      <div class="score-sub">Banked</div>
    </div>
    <div class="turn-pot">
      <div class="pot-label">Turn Points</div>
      <div class="pot-value" id="turnPot">0</div>
      <div class="pot-target">Target · 50</div>
    </div>
    <div class="score-card house" id="cardHouse">
      <div class="score-label">House</div>
      <div class="score-value" id="scoreHouse">0</div>
      <div class="score-sub">Banked</div>
    </div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="diceCanvas" width="420" height="420"></canvas>
    <canvas id="particleCanvas"></canvas>
  </div>

  <div class="turn-indicator" id="turnIndicator">Your Turn</div>

  <div class="actions">
    <button class="roll-btn" id="rollBtn">Roll<span class="spinner"></span></button>
    <button class="roll-btn bank-btn" id="bankBtn">Bank</button>
  </div>

  <div class="history" id="history"></div>
  <button class="reset-btn" id="resetBtn">Restart Game</button>
</main>

<!-- WIN MODAL -->
<div class="modal" id="modal">
  <div class="modal-card">
    <div class="modal-title" id="modalTitle">Victory</div>
    <div class="modal-sub" id="modalSub">You have outrolled the House.</div>
    <button class="roll-btn" id="modalBtn">Play Again</button>
  </div>
</div>

<!-- LIBS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>

<script>
/* ========== LOADER ========== */
window.addEventListener('load', ()=>{
  requestAnimationFrame(()=>{ document.getElementById('progressBar').style.width='100%'; });
  setTimeout(()=>{
    const l=document.getElementById('loader');
    l.style.opacity='0';
    setTimeout(()=>l.remove(),800);
    introAnim();
  },2600);
});

/* ========== SOUNDS ========== */
let audioReady=false;
let noiseSynth, thudSynth, dingSynth, failSynth, tickSynth;
function initAudio(){
  if(audioReady) return;
  audioReady=true;
  Tone.start();
  noiseSynth = new Tone.NoiseSynth({
    noise:{type:'pink'},
    envelope:{attack:.005,decay:.15,sustain:0,release:.1}
  }).toDestination();
  noiseSynth.volume.value = -18;

  thudSynth = new Tone.MembraneSynth({
    pitchDecay:.08, octaves:6,
    envelope:{attack:.001,decay:.4,sustain:0,release:.2}
  }).toDestination();
  thudSynth.volume.value = -6;

  dingSynth = new Tone.Synth({
    oscillator:{type:'triangle'},
    envelope:{attack:.005,decay:.2,sustain:.1,release:.4}
  }).toDestination();
  dingSynth.volume.value = -10;

  failSynth = new Tone.Synth({
    oscillator:{type:'sawtooth'},
    envelope:{attack:.01,decay:.3,sustain:.1,release:.4}
  }).toDestination();
  failSynth.volume.value = -14;

  tickSynth = new Tone.MembraneSynth({
    pitchDecay:.01,octaves:2,
    envelope:{attack:.001,decay:.05,sustain:0,release:.05}
  }).toDestination();
  tickSynth.volume.value = -20;
}
function playShake(){
  if(!audioReady) return;
  const n=8;
  for(let i=0;i<n;i++){
    setTimeout(()=>noiseSynth.triggerAttackRelease('16n'), i*90);
  }
}
function playThud(){ if(audioReady) thudSynth.triggerAttackRelease('C1','8n'); }
function playDing(){
  if(!audioReady) return;
  ['C5','E5','G5'].forEach((n,i)=>setTimeout(()=>dingSynth.triggerAttackRelease(n,'8n'), i*120));
}
function playFail(){
  if(!audioReady) return;
  ['A3','F3','C3'].forEach((n,i)=>setTimeout(()=>failSynth.triggerAttackRelease(n,'8n'), i*140));
}
function playTick(){ if(audioReady) tickSynth.triggerAttackRelease('C4','32n'); }

/* ========== THREE.JS DICE ========== */
const canvas = document.getElementById('diceCanvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(420,420,false);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
camera.position.set(0, 2.2, 5.5);

const ambient = new THREE.AmbientLight(0xffffff, 0.35);
scene.add(ambient);
const dir = new THREE.DirectionalLight(0xffffff, 0.9);
dir.position.set(4,8,5); dir.castShadow=true;
dir.shadow.mapSize.set(1024,1024);
scene.add(dir);
const pt = new THREE.PointLight(0xC9A84C, 1.2, 12);
pt.position.set(-3,2,3);
scene.add(pt);
const rim = new THREE.PointLight(0xffd877, 0.5, 10);
rim.position.set(3,-2,-3);
scene.add(rim);

/* Platform */
const platGeo = new THREE.CylinderGeometry(2.2,2.2,0.15,64);
const platMat = new THREE.MeshStandardMaterial({color:0x111114, roughness:.6, metalness:.3});
const platform = new THREE.Mesh(platGeo, platMat);
platform.position.y = -1.2; platform.receiveShadow=true;
scene.add(platform);
const ringGeo = new THREE.RingGeometry(2.15,2.22,128);
const ringMat = new THREE.MeshBasicMaterial({color:0xC9A84C, side:THREE.DoubleSide, transparent:true, opacity:.7});
const ringMesh = new THREE.Mesh(ringGeo, ringMat);
ringMesh.rotation.x = -Math.PI/2; ringMesh.position.y = -1.115;
scene.add(ringMesh);

/* Dice face textures */
function makeFaceTexture(num){
  const s=256;
  const c=document.createElement('canvas'); c.width=c.height=s;
  const ctx=c.getContext('2d');
  // ivory bg with subtle gradient
  const g=ctx.createRadialGradient(s/2,s/2,20,s/2,s/2,s/1.2);
  g.addColorStop(0,'#fdfaf2'); g.addColorStop(1,'#e8e1cf');
  ctx.fillStyle=g; ctx.fillRect(0,0,s,s);
  // inner border shadow
  ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=4;
  ctx.strokeRect(4,4,s-8,s-8);

  const dot=(x,y)=>{
    const r=22;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    const dg=ctx.createRadialGradient(x-5,y-5,2,x,y,r);
    dg.addColorStop(0,'#222'); dg.addColorStop(1,'#000');
    ctx.fillStyle=dg; ctx.fill();
    ctx.beginPath(); ctx.arc(x+6,y+6,r*0.8,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.15)'; // no-op
  };
  const p=s/4, m=s/2, q=s*3/4;
  const layouts={
    1:[[m,m]],
    2:[[p,p],[q,q]],
    3:[[p,p],[m,m],[q,q]],
    4:[[p,p],[q,p],[p,q],[q,q]],
    5:[[p,p],[q,p],[m,m],[p,q],[q,q]],
    6:[[p,p],[q,p],[p,m],[q,m],[p,q],[q,q]]
  };
  layouts[num].forEach(([x,y])=>dot(x,y));
  const tex=new THREE.CanvasTexture(c);
  tex.anisotropy = 8;
  return tex;
}
/* BoxGeometry face order: +X, -X, +Y, -Y, +Z, -Z
   Standard die: opposite faces sum to 7.
   We'll map: +X=3, -X=4, +Y=1, -Y=6, +Z=2, -Z=5 */
const faceNums=[3,4,1,6,2,5];
const materials = faceNums.map(n => new THREE.MeshStandardMaterial({
  map: makeFaceTexture(n),
  roughness:.35, metalness:.05,
  emissive:0x000000
}));
const diceGeo = new THREE.BoxGeometry(1.6,1.6,1.6);
// soften edges
const dice = new THREE.Mesh(diceGeo, materials);
dice.castShadow=true; dice.position.y=-0.3;
scene.add(dice);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=.08;
controls.enablePan=false; controls.minDistance=4; controls.maxDistance=8;
controls.target.set(0,-0.3,0);

function resizeDiceRenderer(){
  const wrap = document.getElementById('canvasWrap');
  const size = wrap.getBoundingClientRect();
  const width = Math.max(180, Math.floor(size.width));
  const height = Math.max(180, Math.floor(size.height));
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(width, height, false);
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resizeDiceRenderer);
resizeDiceRenderer();

let hoverGlow=0;
canvas.addEventListener('mouseenter',()=>{ gsap.to({v:hoverGlow},{v:1,duration:.4,onUpdate:function(){hoverGlow=this.targets()[0].v}}); });
canvas.addEventListener('mouseleave',()=>{ gsap.to({v:hoverGlow},{v:0,duration:.4,onUpdate:function(){hoverGlow=this.targets()[0].v}}); });

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  materials.forEach(m=>{
    m.emissive.setHex(0x000000);
    m.emissiveIntensity = 0;
  });
  if(hoverGlow>0){
    materials.forEach(m=>{
      m.emissive.setHex(0xC9A84C);
      m.emissiveIntensity = 0.15*hoverGlow;
    });
  }
  renderer.render(scene,camera);
}
animate();

/* Target rotations to land specific face UP (+Y in world) */
const faceRotations = {
  1:{x:0,y:0,z:0},
  6:{x:Math.PI,y:0,z:0},
  2:{x:-Math.PI/2,y:0,z:0},
  5:{x:Math.PI/2,y:0,z:0},
  3:{x:0,y:0,z:-Math.PI/2},
  4:{x:0,y:0,z:Math.PI/2},
};

/* ========== GAME: RACE TO 50 (Pig variant) ==========
   Rules: On your turn, keep rolling to add to TURN POT.
   Roll a 1 → bust, lose pot, turn passes to House.
   Bank → add pot to your banked score, turn passes to House.
   First to 50 wins. House auto-plays (banks at 20 or when close to win). */

const TARGET = 50;
const HOUSE_BANK_THRESHOLD = 20;
let rolling=false;
const game = {
  you:0, house:0, pot:0,
  turn:'you', // 'you' | 'house'
  over:false,
  history:[]
};

function roll(){
  if(rolling || game.over || game.turn!=='you') return;
  initAudio();
  _doRoll('you');
}

function houseRoll(){
  if(game.over || game.turn!=='house') return;
  _doRoll('house');
}

function _doRoll(who){
  rolling=true;
  const btn=document.getElementById('rollBtn');
  const bankBtn=document.getElementById('bankBtn');
  btn.disabled=true; bankBtn.disabled=true;
  if(who==='you') btn.classList.add('loading');
  playShake();

  const result = 1 + Math.floor(Math.random()*6);
  const spins = 4 + Math.floor(Math.random()*3);
  const target = faceRotations[result];

  const tl = gsap.timeline({onComplete:()=>{
    rolling=false; btn.classList.remove('loading');
    finishRoll(result, who);
  }});

  tl.to(camera.position,{z:4.6,duration:.6,ease:'power2.in'},0);
  tl.to(camera.position,{z:5.5,duration:.7,ease:'power3.out'},1.1);
  tl.to(dice.scale,{x:1.15,y:1.15,z:1.15,duration:.5,ease:'power2.out'},0);
  tl.to(dice.scale,{x:1,y:1,z:1,duration:.5,ease:'elastic.out(1,.5)'},1.3);
  tl.to(dice.rotation,{
    x: target.x + Math.PI*2*spins,
    y: target.y + Math.PI*2*(spins+1),
    z: target.z + Math.PI*2*spins,
    duration:1.8, ease:'power3.out'
  },0);
  tl.to(pt,{intensity:2.5,duration:.4,ease:'power2.out'},0);
  tl.to(pt,{intensity:1.2,duration:.6,ease:'power2.in'},1.2);

  setTimeout(()=>playThud(), 1700);
}

function finishRoll(n, who){
  dice.rotation.x = dice.rotation.x % (Math.PI*2);
  dice.rotation.y = dice.rotation.y % (Math.PI*2);
  dice.rotation.z = dice.rotation.z % (Math.PI*2);

  // glow burst
  const glowColor = (n===1)?0x8B0000:0xC9A84C;
  materials.forEach(m=>{ m.emissive.setHex(glowColor); m.emissiveIntensity=0.6; });
  gsap.to({v:0.6},{v:0,duration:1,onUpdate:function(){
    const v=this.targets()[0].v;
    materials.forEach(m=>m.emissiveIntensity=v);
  }});

  spawnSparkles();
  game.history.unshift({n, who});
  if(game.history.length>10) game.history.pop();

  if(n===1){
    // BUST
    playFail();
    game.pot=0;
    flashTurn(who==='you'?'You Busted!':'House Busts!', true);
    updateUI();
    setTimeout(()=>endTurn(), 1100);
  } else {
    game.pot += n;
    if(n===6){ playDing(); spawnConfetti(); }
    updateUI();
    pulsePot();

    // auto-win check (banked + pot would win is allowed only on bank, but roll alone won't win)
    if(who==='house'){
      // House AI: keep rolling unless threshold reached, or about to win
      const wouldWin = game.house + game.pot >= TARGET;
      const shouldBank = wouldWin || game.pot >= HOUSE_BANK_THRESHOLD;
      setTimeout(()=>{
        if(shouldBank) bankFor('house');
        else houseRoll();
      }, 900);
    } else {
      // re-enable player controls
      document.getElementById('rollBtn').disabled=false;
      document.getElementById('bankBtn').disabled=false;
    }
  }
}

function bank(){
  if(rolling || game.over || game.turn!=='you' || game.pot===0) return;
  initAudio(); playTick();
  bankFor('you');
}

function bankFor(who){
  game[who] += game.pot;
  game.pot = 0;
  updateUI();
  if(game[who] >= TARGET){
    game.over=true;
    showWin(who);
    return;
  }
  endTurn();
}

function endTurn(){
  game.pot=0;
  game.turn = (game.turn==='you')?'house':'you';
  updateUI();
  flashTurn(game.turn==='you'?'Your Turn':"House's Turn", false);
  if(game.turn==='house'){
    document.getElementById('rollBtn').disabled=true;
    document.getElementById('bankBtn').disabled=true;
    setTimeout(()=>houseRoll(), 1000);
  } else {
    document.getElementById('rollBtn').disabled=false;
    document.getElementById('bankBtn').disabled=true; // can't bank with 0
  }
}

function flashTurn(msg, bust){
  const el=document.getElementById('turnIndicator');
  el.textContent=msg;
  el.classList.toggle('bust', !!bust);
  gsap.fromTo(el,{y:-8,opacity:0},{y:0,opacity:1,duration:.5,ease:'power3.out'});
}
function pulsePot(){
  gsap.fromTo('#turnPot',{scale:1.4,color:'#fff'},{scale:1,color:'#F0EDE8',duration:.6,ease:'power3.out'});
}

function updateUI(){
  document.getElementById('scoreYou').textContent = game.you;
  document.getElementById('scoreHouse').textContent = game.house;
  document.getElementById('turnPot').textContent = game.pot;
  document.getElementById('cardYou').classList.toggle('active', game.turn==='you' && !game.over);
  document.getElementById('cardHouse').classList.toggle('active', game.turn==='house' && !game.over);
  document.getElementById('bankBtn').disabled = (game.turn!=='you' || game.pot===0 || rolling || game.over);
  document.getElementById('rollBtn').disabled = (game.turn!=='you' || rolling || game.over);

  const h=document.getElementById('history'); h.innerHTML='';
  game.history.forEach(({n,who})=>{
    const c=document.createElement('div');
    c.className='chip'+(n===6?' gold':n===1?' red':'');
    c.textContent=n;
    c.title=(who==='you'?'You':'House')+' rolled '+n;
    if(who==='house') c.style.opacity='.55';
    h.appendChild(c);
  });
}

function showWin(winner){
  const modal=document.getElementById('modal');
  const card=modal.querySelector('.modal-card');
  const title=document.getElementById('modalTitle');
  const sub=document.getElementById('modalSub');
  if(winner==='you'){
    card.classList.remove('lose');
    title.textContent='Victory';
    sub.textContent='You have outrolled the House.';
    playDing(); setTimeout(()=>{spawnConfetti();spawnConfetti();},200);
  } else {
    card.classList.add('lose');
    title.textContent='Defeat';
    sub.textContent='The House claims this round.';
    playFail();
  }
  modal.classList.add('show');
}

function resetGame(){
  game.you=0; game.house=0; game.pot=0;
  game.turn='you'; game.over=false; game.history=[];
  document.getElementById('modal').classList.remove('show');
  updateUI();
  flashTurn('Your Turn', false);
}

document.getElementById('rollBtn').addEventListener('click',()=>{ initAudio(); playTick(); roll(); });
document.getElementById('bankBtn').addEventListener('click',()=>{ bank(); });
document.getElementById('resetBtn').addEventListener('click',()=>{ playTick(); resetGame(); });
document.getElementById('modalBtn').addEventListener('click',()=>{ playTick(); resetGame(); });

// initial UI
updateUI();

/* ========== PARTICLES ========== */
const pCanvas=document.getElementById('particleCanvas');
const pCtx=pCanvas.getContext('2d');
function sizePCanvas(){
  const r=pCanvas.getBoundingClientRect();
  pCanvas.width=r.width*devicePixelRatio;
  pCanvas.height=r.height*devicePixelRatio;
  pCtx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}
sizePCanvas();
window.addEventListener('resize',sizePCanvas);

const particles=[];
function spawnConfetti(){
  const w=pCanvas.clientWidth, h=pCanvas.clientHeight;
  for(let i=0;i<55;i++){
    const a=Math.random()*Math.PI*2;
    const sp=2+Math.random()*5;
    particles.push({
      x:w/2,y:h/2,
      vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,
      g:.12, life:1, decay:.012+Math.random()*.008,
      size:2+Math.random()*4,
      color: Math.random()<0.3 ? '#8B0000' : (Math.random()<0.5?'#C9A84C':'#e3c878'),
      rot:Math.random()*Math.PI, vr:(Math.random()-.5)*.2
    });
  }
}
function spawnSparkles(){
  const w=pCanvas.clientWidth, h=pCanvas.clientHeight;
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2;
    const sp=.5+Math.random()*1.5;
    particles.push({
      x:w/2+(Math.random()-.5)*60,y:h/2+(Math.random()-.5)*40,
      vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-.3,
      g:.02, life:1, decay:.02,
      size:1+Math.random()*2, color:'#fff8d6', spark:true,
      rot:0,vr:0
    });
  }
}
function tickParticles(){
  pCtx.clearRect(0,0,pCanvas.clientWidth,pCanvas.clientHeight);
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.vy+=p.g; p.x+=p.vx; p.y+=p.vy;
    p.life-=p.decay; p.rot+=p.vr;
    if(p.life<=0){particles.splice(i,1);continue}
    pCtx.save();
    pCtx.globalAlpha=Math.max(0,p.life);
    pCtx.translate(p.x,p.y); pCtx.rotate(p.rot);
    if(p.spark){
      pCtx.fillStyle=p.color;
      pCtx.shadowColor=p.color; pCtx.shadowBlur=8;
      pCtx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
    } else {
      pCtx.fillStyle=p.color;
      pCtx.shadowColor=p.color; pCtx.shadowBlur=10;
      pCtx.fillRect(-p.size,-p.size/2,p.size*2,p.size);
    }
    pCtx.restore();
  }
  requestAnimationFrame(tickParticles);
}
tickParticles();

/* ========== INTRO ========== */
function introAnim(){
  try {
    gsap.from('.title',{y:-30,opacity:0,duration:1,ease:'power3.out'});
    gsap.from('.subtitle',{y:-10,opacity:0,duration:.8,delay:.3,ease:'power2.out'});
    gsap.from('.scoreboard',{y:-15,opacity:0,duration:.8,delay:.4,ease:'power2.out'});
    gsap.from('#canvasWrap',{scale:.7,opacity:0,duration:1.1,delay:.6,ease:'back.out(1.4)'});
    if (typeof dice !== 'undefined' && dice && dice.rotation) {
      gsap.from(dice.rotation,{x:Math.PI*4,y:Math.PI*4,duration:1.6,delay:.6,ease:'power3.out'});
    }
  } catch(e){ console.warn('intro anim skipped', e); }
}
